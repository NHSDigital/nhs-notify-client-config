name: "Publish client config events via event-builder"
description: "Reads a Client JSON payload and publishes client configuration events to an SQS queue."
author: "NHS Notify"

inputs:
  json-file:
    description: "Path to a JSON file containing a Client object or array of Client objects"
    required: true
  environment:
    description: "Queue environment label (e.g. de2-aiyu1, int)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Resolve and download event-builder bundle
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        CALLER_REPO: ${{ github.repository }}
        ACTION_REPO: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
        RELEASE_ASSET_NAME: event-builder-bundle.tgz
        WORKFLOW_ARTIFACT_NAME: event-builder-bundle
      run: |
        set -euo pipefail

        download_dir="${RUNNER_TEMP}/event-builder"
        unpack_dir="${download_dir}/unpacked"

        mkdir -p "${download_dir}" "${unpack_dir}"

        echo "[event-builder] caller_repo=${CALLER_REPO}"
        echo "[event-builder] action_repo=${ACTION_REPO}"
        echo "[event-builder] action_ref=${ACTION_REF:-<empty>}"

        if [[ -z "${ACTION_REF}" ]]; then
          echo "ERROR: github.action_ref is empty; unable to locate release asset or branch artifact." >&2
          exit 1
        fi

        if [[ -z "${ACTION_REPO}" ]]; then
          echo "ERROR: github.action_repository is empty; unable to determine where to fetch bundle artifacts." >&2
          exit 1
        fi

        # Prefer release assets when the action ref is a tag with a matching release in the action repo.
        if gh release view "${ACTION_REF}" --repo "${ACTION_REPO}" >/dev/null 2>&1; then
          echo "[event-builder] Found release for ref '${ACTION_REF}' in '${ACTION_REPO}'. Downloading '${RELEASE_ASSET_NAME}'."
          gh release download "${ACTION_REF}" --repo "${ACTION_REPO}" --pattern "${RELEASE_ASSET_NAME}" --dir "${download_dir}"
          tar -xzf "${download_dir}/${RELEASE_ASSET_NAME}" -C "${unpack_dir}"
          echo "[event-builder] Bundle extracted from release asset."
          exit 0
        fi

        # Otherwise treat the ref as a branch-like ref and fetch the latest successful CI artifact.
        branch="${ACTION_REF#refs/heads/}"
        echo "[event-builder] No release found for ref '${ACTION_REF}'. Falling back to latest workflow artifact on branch '${branch}' from '${ACTION_REPO}'."

        run_id=""
        workflow_used=""

        for workflow_file in "stage-3-build.yaml" "cicd-1-pull-request.yaml"; do
          echo "[event-builder] Looking for successful runs in workflow '${workflow_file}'."

          set +e
          run_id_candidate="$(gh run list \
            --repo "${ACTION_REPO}" \
            --workflow "${workflow_file}" \
            --branch "${branch}" \
            --status success \
            --json databaseId \
            --jq '.[0].databaseId' 2>/tmp/event_builder_run_list_err.log)"
          rc=$?
          set -e

          if [[ $rc -ne 0 ]]; then
            if grep -q "HTTP 404" /tmp/event_builder_run_list_err.log; then
              echo "[event-builder] Workflow '${workflow_file}' not found; trying next workflow candidate."
              continue
            fi

            echo "ERROR: Failed to query workflow runs from '${ACTION_REPO}' for workflow '${workflow_file}'." >&2
            cat /tmp/event_builder_run_list_err.log >&2 || true
            exit 1
          fi

          if [[ -n "${run_id_candidate}" && "${run_id_candidate}" != "null" ]]; then
            run_id="${run_id_candidate}"
            workflow_used="${workflow_file}"
            break
          fi
        done

        if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
          echo "ERROR: Could not find a successful run on branch '${branch}' in '${ACTION_REPO}' containing artifact '${WORKFLOW_ARTIFACT_NAME}'. Checked workflows: stage-3-build.yaml, cicd-1-pull-request.yaml." >&2
          exit 1
        fi

        echo "[event-builder] Downloading artifact '${WORKFLOW_ARTIFACT_NAME}' from workflow run ${run_id} (${workflow_used}) in '${ACTION_REPO}'."
        gh run download "${run_id}" --repo "${ACTION_REPO}" --name "${WORKFLOW_ARTIFACT_NAME}" --dir "${download_dir}"

        tarball_path="${download_dir}/${RELEASE_ASSET_NAME}"
        if [[ ! -f "${tarball_path}" ]]; then
          echo "ERROR: Downloaded artifact did not contain expected tarball '${RELEASE_ASSET_NAME}'." >&2
          ls -la "${download_dir}" >&2
          exit 1
        fi

        tar -xzf "${tarball_path}" -C "${unpack_dir}"
        echo "[event-builder] Bundle extracted from workflow artifact."

    - name: Run event-builder
      shell: bash
      run: |
        set -euo pipefail

        echo "[event-builder] Starting publish run"
        echo "[event-builder] json-file='${{ inputs.json-file }}' environment='${{ inputs.environment }}'"

        node "${RUNNER_TEMP}/event-builder/unpacked/index.cjs" \
          publish-clients \
          --json-file "${{ inputs.json-file }}" \
          --environment "${{ inputs.environment }}"

        echo "[event-builder] Publish run completed"
